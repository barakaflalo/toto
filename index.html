// ============================================================
// PREDICTION ENGINE
// ============================================================
function formScore(form){
  if(!form?.length)return 0.5;
  const w=[0.35,0.25,0.2,0.12,0.08];let s=0;
  form.forEach((r,i)=>{const wt=w[i]||0.05;s+=r===1?wt:r===2?wt*0.4:0;});
  return Math.min(1,s/0.7);
}
function predictFromData(hs,as_){
  const D={wins:40,draws:20,losses:40,form:[0,1,0,1,0],position:8,goalsFor:1.2,goalsAgainst:1.4};
  const h={...D,...hs},a={...D,...as_};
  const ht=h.wins+h.draws+h.losses||1,at=a.wins+a.draws+a.losses||1;
  const eloP=1/(1+Math.pow(10,-((1500+(16-(h.position||8))*40)-(1500+(16-(a.position||8))*40))/400));
  const hS=(h.wins/ht)*0.25+formScore(h.form)*0.2+eloP*0.25+(h.goalsFor/1.5)*0.1+(1-h.goalsAgainst/2.5)*0.1+0.12;
  const aS=(a.wins/at)*0.25+formScore(a.form)*0.2+(1-eloP)*0.25+(a.goalsFor/1.5)*0.1+(1-a.goalsAgainst/2.5)*0.1;
  const dF=((h.draws/ht+a.draws/at)/2)*0.85;
  const tot=hS+aS+dF||1;
  const win=Math.round(hS/tot*100),loss=Math.round(aS/tot*100),draw=100-win-loss;
  const max=Math.max(win,draw,loss);
  const pred=win>=draw&&win>=loss?'1':draw>=win&&draw>=loss?'X':'2';
  const sorted=[{v:win,l:'1'},{v:draw,l:'X'},{v:loss,l:'2'}].sort((a,b)=>b.v-a.v);
  const surprise=sorted[1].v>=26?sorted[1].l:sorted[2].l;
  return{win,draw,loss,pred,surprise,max,
    conf:max>55?'גבוהה':max>42?'בינונית':'נמוכה',
    confColor:max>55?'#1D9E75':max>42?'#BA7517':'#A32D2D',
    hForm:h.form,aForm:a.form,hPos:h.position,aPos:a.position,hGf:h.goalsFor,aGf:a.goalsFor};
}

// ============================================================
// AI CALLS
// ============================================================
async function callClaude(prompt,useSearch=true){
  const body={model:'claude-sonnet-4-20250514',max_tokens:1000,
    messages:[{role:'user',content:prompt}]};
  if(useSearch)body.tools=[{type:'web_search_20250305',name:'web_search'}];
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  const data=await res.json();
  return data.content?.filter(b=>b.type==='text').map(b=>b.text).join('')||'';
}

async function fetchWeeklyGames(){
  const text=await callClaude(
    `Search toto.co.il for the current week's Toto (טוטו) Israel form. Find all 16 football matches.
Return ONLY a JSON array, no markdown:
[{"home":"שם קבוצה בעברית","away":"שם קבוצה בעברית","league":"שם הליגה בעברית"}]
All 16 matches in order with Hebrew names.`);
  const m=text.match(/\[[\s\S]*?\]/);
  if(m){const arr=JSON.parse(m[0]);if(Array.isArray(arr)&&arr.length>=10)return arr.slice(0,16).map((g,i)=>({id:i+1,...g}));}
  return null;
}

async function fetchTeamStats(teamName,league){
  try{
    const text=await callClaude(
      `Search sofascore.com, flashscore.co.il or one.co.il for 2024-2025 season stats for football team "${teamName}" in ${league||'football'}.
Return ONLY JSON: {"wins":N,"draws":N,"losses":N,"position":N,"goalsFor":N,"goalsAgainst":N,"form":[1=win,2=draw,0=loss last 5]}`);
    const m=text.match(/\{[\s\S]*?\}/);if(m)return JSON.parse(m[0]);
  }catch{}
  return null;
}

// ============================================================
// ROOT
// ============================================================
function App(){
  const [screen,setScreen]=useState('setup');
  const [dataMode,setDM]=useState('ai');
  const [games,setGames]=useState([]);
  const [preds,setPreds]=useState({});
  const [history,setHistory]=useState([]);
  const [savedMode,setSaved]=useState(null);

  useEffect(()=>{
    setHistory(loadHistory());
    const m=loadMode();if(m)setSaved(m);
  },[]);

  const handleSetup=(mode)=>{setDM(mode);saveMode(mode);setScreen('enter');};
  const handleGamesEntered=async(enteredGames)=>{
    setGames(enteredGames);setScreen('loading');
    const newPreds={};
    for(const g of enteredGames){
      try{
        let hs=null,as_=null;
        if(dataMode==='ai'){[hs,as_]=await Promise.all([fetchTeamStats(g.home,g.league),fetchTeamStats(g.away,g.league)]);}
        newPreds[g.id]=predictFromData(hs||{},as_||{});
      }catch{newPreds[g.id]=predictFromData({},{});}
    }
    setPreds(newPreds);
    const safeRow=buildRow('safe',newPreds,enteredGames);
    const newEntry={date:new Date().toISOString(),games:enteredGames,preds:newPreds,safeRow};
    const updated=[newEntry,...history].slice(0,20);
    setHistory(updated);saveHistory(updated);
    setScreen('main');
  };

  return React.createElement('div',null,
    screen==='setup'&&React.createElement(SetupScreen,{savedMode,onDone:handleSetup}),
    screen==='enter'&&React.createElement(EnterGamesScreen,{onDone:handleGamesEntered,onHistory:()=>setScreen('history')}),
    screen==='loading'&&React.createElement(LoadingScreen,{games}),
    screen==='main'&&React.createElement(MainApp,{games,preds,dataMode,
      onNewForm:()=>setScreen('enter'),onHistory:()=>setScreen('history'),onCompare:()=>setScreen('history')}),
    screen==='history'&&React.createElement(HistoryScreen,{history,
      onBack:()=>setScreen(games.length?'main':'enter'),
      onLoad:entry=>{setGames(entry.games);setPreds(entry.preds||{});setScreen('main');}})
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
