// ── Prediction Engine ─────────────────────────────────────────
function formScore(form){
  if(!form?.length)return 0.5;
  const w=[0.35,0.25,0.2,0.12,0.08];let s=0;
  form.forEach((r,i)=>{const wt=w[i]||0.05;s+=r===1?wt:r===2?wt*0.4:0});
  return Math.min(1,s/0.7);
}
function predict(hs,as_){
  const D={wins:40,draws:20,losses:40,form:[0,1,0,1,0],position:8,goalsFor:1.2,goalsAgainst:1.4};
  const h={...D,...(hs||{})},a={...D,...(as_||{})};
  const ht=h.wins+h.draws+h.losses||1,at=a.wins+a.draws+a.losses||1;
  const elo=1/(1+Math.pow(10,-((16-(h.position||8))*40-(16-(a.position||8))*40)/400));
  const hS=(h.wins/ht)*0.25+formScore(h.form)*0.2+elo*0.25+(h.goalsFor/1.5)*0.1+(1-h.goalsAgainst/2.5)*0.1+0.12;
  const aS=(a.wins/at)*0.25+formScore(a.form)*0.2+(1-elo)*0.25+(a.goalsFor/1.5)*0.1+(1-a.goalsAgainst/2.5)*0.1;
  const dF=((h.draws/ht+a.draws/at)/2)*0.85;
  const tot=hS+aS+dF||1;
  const win=Math.round(hS/tot*100),loss=Math.round(aS/tot*100),draw=100-win-loss;
  const max=Math.max(win,draw,loss);
  const pred=win>=draw&&win>=loss?'1':draw>=win&&draw>=loss?'X':'2';
  const sorted=[{v:win,l:'1'},{v:draw,l:'X'},{v:loss,l:'2'}].sort((a,b)=>b.v-a.v);
  return{win,draw,loss,pred,max,surprise:sorted[1].v>=26?sorted[1].l:sorted[2].l,
    conf:max>55?'גבוהה':max>42?'בינונית':'נמוכה',confColor:max>55?'#1D9E75':max>42?'#BA7517':'#A32D2D',
    hForm:h.form,aForm:a.form,hPos:h.position,aPos:a.position,hGf:h.goalsFor,aGf:a.goalsFor};
}

// ── AI ────────────────────────────────────────────────────────
async function callClaude(prompt){
  const res=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
      tools:[{type:'web_search_20250305',name:'web_search'}],
      messages:[{role:'user',content:prompt}]})});
  const d=await res.json();
  return d.content?.filter(b=>b.type==='text').map(b=>b.text).join('')||'';
}
async function fetchWeeklyGames(){
  const text=await callClaude(`Search toto.co.il for this week's Israeli Toto 16 matches. Return ONLY JSON array no markdown:
[{"home":"קבוצה","away":"קבוצה","league":"ליגה"}] with all 16 matches in Hebrew.`);
  const m=text.match(/\[[\s\S]*?\]/);
  if(m){const arr=JSON.parse(m[0]);if(Array.isArray(arr)&&arr.length>=10)return arr.slice(0,16).map((g,i)=>({id:i+1,...g}))}
  return null;
}
async function fetchStats(name,league){
  try{
    const text=await callClaude(`Search sofascore.com or one.co.il for 2024-2025 stats of "${name}" in ${league||'football'}.
Return ONLY JSON: {"wins":N,"draws":N,"losses":N,"position":N,"goalsFor":N,"goalsAgainst":N,"form":[1,0,2,1,0]}`);
    const m=text.match(/\{[\s\S]*?\}/);if(m)return JSON.parse(m[0]);
  }catch{}return null;
}

// ── Utils ─────────────────────────────────────────────────────
const VC=v=>v==='1'?'#1D9E75':v==='X'?'#BA7517':'#A32D2D';
const VB=v=>v==='1'?'#E1F5EE':v==='X'?'#FAEEDA':'#FCEBEB';
const fmtD=d=>{const dt=new Date(d);return`${dt.getDate()}/${dt.getMonth()+1}/${dt.getFullYear()}`};
function buildRow(mode,preds,games){
  return games.map(g=>{
    const p=preds[g.id];if(!p)return'?';
    if(mode==='safe')return p.pred;
    if(mode==='surprise')return p.surprise;
    return p.max<50?[{v:p.win,l:'1'},{v:p.draw,l:'X'},{v:p.loss,l:'2'}].sort((a,b)=>b.v-a.v)[1].l:p.pred;
  });
}
const STRATS=[
  {key:'safe',icon:'🛡️',title:'שורה בטוחה',badge:'הכי בטוח',bc:'#1D9E75',bg:'#E1F5EE',tc:'#085041'},

];

// ── Enter Games Screen ────────────────────────────────────────
function EnterGames({onDone,onHistory}){
  const [games,setGames]=useState(()=>Array.from({length:16},(_,i)=>({id:i+1,home:'',away:'',league:''})));
  const [loading,setLoading]=useState(false);
  const [autoLoad,setAutoLoad]=useState(false);
  const [autoMsg,setAutoMsg]=useState('');
  const [autoErr,setAutoErr]=useState('');
  const filled=games.filter(g=>g.home.trim()&&g.away.trim()).length;
  const upd=(id,f,v)=>setGames(p=>p.map(g=>g.id===id?{...g,[f]:v}:g));
  const LEAGUES=['ליגת העל','פרמייר ליג','לה ליגה','בונדסליגה','סריה א','ליג 1','ארדיביזי','ליגת האלופות','אחר'];

  // פרסור טקסט מ-toto.co.il
  const [pasteText,setPasteText]=useState('');
  const [showPaste,setShowPaste]=useState(false);

  function parseGamesFromText(text){
    const lines=text.split(/[\n\r]+/).map(l=>l.trim()).filter(Boolean);
    const found=[];
    // חפש דפוסי "קבוצה נגד קבוצה" או "קבוצה - קבוצה" או "קבוצה vs קבוצה"
    const patterns=[
      /^(.+?)\s+(?:נגד|vs\.?|-|–)\s+(.+?)(?:\s+[\(\[].*[\)\]])?$/i,
      /^\d+[\.)]\.?\s*(.+?)\s+(?:נגד|vs\.?|-|–)\s+(.+)$/i,
    ];
    for(const line of lines){
      for(const pat of patterns){
        const m=line.match(pat);
        if(m){
          const home=m[1].replace(/^\d+[\.)]\.?\s*/,'').trim();
          const away=m[2].replace(/[\(\[].*[\)\]].*$/,'').trim();
          if(home.length>1&&away.length>1&&found.length<16){
            // נסה לזהות ליגה
            const lstr=line.toLowerCase();
            const league=lstr.includes('פרמייר')||lstr.includes('אנגל')?'פרמייר ליג':
              lstr.includes('ספרד')||lstr.includes('לה ליגה')?'לה ליגה':
              lstr.includes('גרמנ')||lstr.includes('בונד')?'בונדסליגה':
              lstr.includes('איטל')||lstr.includes('סריה')?'סריה א':
              lstr.includes('צרפת')||lstr.includes('ליג 1')?'ליג 1':
              lstr.includes('ליגת העל')||lstr.includes('ישראל')?'ליגת העל':'';
            found.push({id:found.length+1,home,away,league});
            break;
          }
        }
      }
    }
    // נסיון שני — חפש שורות עם "בית" ו"חוץ"
    if(found.length<8){
      const homeAwayPat=/([\u0590-\u05FF\w\s]+?)\s{2,}([\u0590-\u05FF\w\s]+)/g;
      let m2;
      while((m2=homeAwayPat.exec(text))&&found.length<16){
        const h=m2[1].trim(),a=m2[2].trim();
        if(h.length>2&&a.length>2&&!h.match(/^\d+$/)&&!a.match(/^\d+$/))
          found.push({id:found.length+1,home:h,away:a,league:''});
      }
    }
    return found;
  }

  const handlePasteParse=()=>{
    if(!pasteText.trim()){setAutoErr('הדבק תחילה את הטקסט');return;}
    const found=parseGamesFromText(pasteText);
    if(found.length>=8){
      setAutoMsg(`✓ זוהו ${found.length} משחקים!`);
      const filled2=found.length===16?found:[...found,...Array.from({length:16-found.length},(_,i)=>({id:found.length+i+1,home:'',away:'',league:''}))];
      setGames(filled2);setShowPaste(false);setPasteText('');
      setTimeout(()=>setAutoMsg(''),3000);
    }else{
      setAutoErr(`זוהו רק ${found.length} משחקים — נסה להעתיק יותר טקסט מהדף`);
    }
  };

  const handleAuto=()=>{setShowPaste(true);setAutoErr('');};

  return <div style={{minHeight:'100vh',background:'#f8f8fc'}}>
    <div style={{background:'#fff',borderBottom:'0.5px solid #e8e8f0',padding:'16px 16px 12px',position:'sticky',top:0,zIndex:100}}>
      <div style={{maxWidth:600,margin:'0 auto',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <div style={{fontSize:15,fontWeight:500}}>📋 הכנסת טופס</div>
          <div style={{fontSize:10,color:'#888'}}>מ-toto.co.il</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <button onClick={onHistory} style={{background:'#f5f5f5',border:'0.5px solid #e0e0e0',borderRadius:8,padding:'6px 12px',color:'#888',cursor:'pointer',fontSize:11}}>📚 היסטוריה</button>
          <div style={{textAlign:'center'}}>
            <div style={{fontSize:9,color:'#aaa'}}>הוכנסו</div>
            <div style={{fontSize:18,fontWeight:500,color:filled===16?'#1D9E75':'#1a1a2e'}}>{filled}<span style={{fontSize:11,color:'#aaa'}}>/16</span></div>
          </div>
        </div>
      </div>
    </div>
    <div style={{maxWidth:600,margin:'0 auto',padding:'14px 14px 130px'}}>
      <div style={{background:'#fff',borderRadius:14,padding:16,marginBottom:14,border:'0.5px solid #AFA9EC'}}>
        <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:10}}>
          <div style={{width:36,height:36,borderRadius:10,background:'#EEEDFE',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>🤖</div>
          <div>
            <div style={{fontSize:13,fontWeight:500}}>טעינה אוטומטית</div>
            <div style={{fontSize:11,color:'#888'}}>Claude יחפש את 16 המשחקים</div>
          </div>
        </div>
        {!showPaste?<>
          <button onClick={handleAuto} style={{width:'100%',padding:12,borderRadius:10,border:'none',background:'#534AB7',color:'#fff',fontWeight:500,cursor:'pointer',fontSize:13}}>
            ✨ טען טופס שבועי — הדבק טקסט
          </button>
          <div style={{marginTop:8,fontSize:11,color:'#888',lineHeight:1.7,textAlign:'center'}}>
            כנס ל-<a href="https://www.toto.co.il" target="_blank" style={{color:'#534AB7'}}>toto.co.il</a> ← העתק את כל הטקסט של הדף ← הדבק כאן
          </div>
        </>:<div>
          <div style={{fontSize:11,color:'#534AB7',fontWeight:500,marginBottom:8}}>
            📋 הדבק את הטקסט מ-toto.co.il:
          </div>
          <div style={{fontSize:11,color:'#888',marginBottom:8,lineHeight:1.7,background:'#f5f5f5',borderRadius:8,padding:'8px 10px'}}>
            1. כנס ל-<a href="https://www.toto.co.il" target="_blank" style={{color:'#534AB7'}}>toto.co.il</a><br/>
            2. בחר הכל (Ctrl+A) ← העתק (Ctrl+C)<br/>
            3. הדבק כאן ולחץ "נתח"
          </div>
          <textarea value={pasteText} onChange={e=>setPasteText(e.target.value)}
            placeholder="הדבק כאן את הטקסט מהאתר..."
            style={{width:'100%',minHeight:120,padding:'10px 12px',borderRadius:10,border:'0.5px solid #AFA9EC',
              background:'#fafafa',fontSize:12,resize:'vertical',outline:'none',marginBottom:8,direction:'rtl'}}/>
          <div style={{display:'flex',gap:8}}>
            <button onClick={handlePasteParse} style={{flex:1,padding:11,borderRadius:10,border:'none',background:'#534AB7',color:'#fff',fontWeight:500,cursor:'pointer',fontSize:13}}>
              🔍 נתח טקסט
            </button>
            <button onClick={()=>{setShowPaste(false);setPasteText('');setAutoErr('')}} style={{padding:'11px 14px',borderRadius:10,border:'0.5px solid #e0e0e0',background:'#fff',color:'#888',cursor:'pointer',fontSize:12}}>
              ביטול
            </button>
          </div>
        </div>}
        {autoMsg&&<div style={{marginTop:8,padding:'8px 12px',background:'#E1F5EE',borderRadius:8,fontSize:11,color:'#085041',textAlign:'center'}}>{autoMsg}</div>}
        {autoErr&&<div style={{marginTop:8,padding:'8px 12px',background:'#FCEBEB',borderRadius:8,fontSize:11,color:'#501313',textAlign:'center'}}>{autoErr}</div>}
      </div>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
        <div style={{flex:1,height:'0.5px',background:'#e0e0e0'}}/>
        <div style={{fontSize:11,color:'#aaa'}}>או הכנס ידנית</div>
        <div style={{flex:1,height:'0.5px',background:'#e0e0e0'}}/>
      </div>
      <div style={{background:'#EEEDFE',borderRadius:10,padding:'10px 14px',marginBottom:14,border:'0.5px solid #AFA9EC',fontSize:11,color:'#534AB7',lineHeight:1.8}}>
        💡 כנס ל-<strong>toto.co.il</strong> · נתונים מ-<strong>one.co.il · sofascore · flashscore</strong>
      </div>
      {games.map((g,i)=><div key={g.id} style={{background:'#fff',borderRadius:12,padding:'11px 12px',marginBottom:7,border:`0.5px solid ${g.home&&g.away?'#AFA9EC':'#e8e8f0'}`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <div style={{fontSize:9,color:'#aaa'}}>משחק #{i+1}</div>
          <select value={g.league} onChange={e=>upd(g.id,'league',e.target.value)} style={{background:'#f5f5f5',border:'none',color:'#888',fontSize:10,borderRadius:6,padding:'3px 6px'}}>
            <option value="">ליגה...</option>
            {LEAGUES.map(l=><option key={l}>{l}</option>)}
          </select>
        </div>
        <div style={{display:'flex',gap:7,alignItems:'center'}}>
          <input placeholder="קבוצת בית" value={g.home} onChange={e=>upd(g.id,'home',e.target.value)}
            style={{flex:1,padding:'9px 11px',borderRadius:9,border:`0.5px solid ${g.home?'#AFA9EC':'#e0e0e0'}`,background:'#fafafa',fontSize:12,outline:'none',color:'#1a1a2e'}}/>
          <div style={{fontSize:10,color:'#ccc',fontWeight:500}}>VS</div>
          <input placeholder="קבוצת חוץ" value={g.away} onChange={e=>upd(g.id,'away',e.target.value)}
            style={{flex:1,padding:'9px 11px',borderRadius:9,border:`0.5px solid ${g.away?'#AFA9EC':'#e0e0e0'}`,background:'#fafafa',fontSize:12,outline:'none',color:'#1a1a2e'}}/>
        </div>
      </div>)}
    </div>
    <div style={{position:'fixed',bottom:0,left:0,right:0,background:'linear-gradient(0deg,#f8f8fc 60%,transparent)',padding:'14px 14px 22px'}}>
      <div style={{maxWidth:600,margin:'0 auto'}}>
        <button onClick={()=>{if(filled<16||loading)return;setLoading(true);onDone(games.filter(g=>g.home.trim()&&g.away.trim()));}} disabled={filled<16||loading}
          style={{width:'100%',padding:16,borderRadius:13,border:'none',background:filled===16?'#534AB7':'#e0e0e0',color:filled===16?'#fff':'#aaa',fontWeight:500,fontSize:14,cursor:filled===16?'pointer':'default'}}>
          {loading?'⏳ טוען...':filled<16?`עוד ${16-filled} משחקים...`:'🤖 נתח את הטופס ←'}
        </button>
      </div>
    </div>
  </div>;
}

// ── Loading Screen ────────────────────────────────────────────
function Loading({games}){
  const steps=['מחפש נתוני קבוצות...','טוען תוצאות...','מחשב ELO...','בונה תחזיות...','מכין שורות...'];
  const [step,setStep]=useState(0);
  useEffect(()=>{const t=setInterval(()=>setStep(s=>Math.min(s+1,4)),1200);return()=>clearInterval(t);},[]);
  return <div style={{minHeight:'100vh',background:'#f8f8fc',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:24}}>
    <div style={{fontSize:52,marginBottom:16,animation:'spin 2s linear infinite'}}>⚙️</div>
    <div style={{fontSize:15,fontWeight:500,color:'#534AB7',marginBottom:6}}>מנתח {games.length} משחקים</div>
    <div style={{fontSize:12,color:'#aaa',marginBottom:28}}>{steps[step]}</div>
    <div style={{width:260}}>
      {games.slice(0,6).map((g,i)=><div key={i} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',borderBottom:'0.5px solid #e8e8f0',fontSize:11}}>
        <span style={{color:i<=step*3?'#534AB7':'#ccc'}}>{g.home}</span>
        <span style={{color:'#ddd'}}>vs</span>
        <span style={{color:i<=step*3?'#534AB7':'#ccc'}}>{g.away}</span>
      </div>)}
    </div>
  </div>;
}

// ── History Screen ────────────────────────────────────────────
function History({history,onBack,onLoad}){
  const [sel,setSel]=useState(null);
  const entry=sel!=null?history[sel]:null;
  return <div style={{minHeight:'100vh',background:'#f8f8fc'}}>
    <div style={{background:'#fff',borderBottom:'0.5px solid #e8e8f0',padding:'16px 14px',position:'sticky',top:0}}>
      <div style={{maxWidth:600,margin:'0 auto',display:'flex',alignItems:'center',gap:12}}>
        <button onClick={sel!=null?()=>setSel(null):onBack} style={{background:'#f5f5f5',border:'0.5px solid #e0e0e0',borderRadius:8,padding:'7px 13px',color:'#888',cursor:'pointer',fontSize:12}}>←</button>
        <div style={{fontSize:15,fontWeight:500}}>📚 היסטוריה</div>
        <div style={{fontSize:11,color:'#aaa'}}>{history.length} טפסים</div>
      </div>
    </div>
    <div style={{maxWidth:600,margin:'0 auto',padding:'14px 13px 40px'}}>
      {!entry&&<>
        {history.length===0&&<div style={{textAlign:'center',padding:'60px 20px',color:'#aaa',fontSize:13}}>אין היסטוריה עדיין.</div>}
        {history.map((h,i)=><div key={i} onClick={()=>setSel(i)} style={{background:'#fff',borderRadius:13,padding:'13px 14px',marginBottom:8,border:'0.5px solid #e8e8f0',cursor:'pointer'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <div style={{fontSize:13,fontWeight:500}}>טופס {fmtD(h.date)}</div>
            <div style={{fontSize:10,color:'#aaa'}}>{h.games?.length} משחקים</div>
          </div>
          <div style={{display:'flex',gap:3,flexWrap:'wrap'}}>{h.safeRow?.map((v,j)=><Cell key={j} v={v}/>)}</div>
        </div>)}
      </>}
      {entry&&<>
        <div style={{background:'#fff',borderRadius:14,padding:16,marginBottom:14,border:'0.5px solid #e8e8f0'}}>
          <div style={{fontSize:12,color:'#534AB7',fontWeight:500,marginBottom:10}}>🛡️ שורה בטוחה</div>
          <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
            {entry.safeRow?.map((v,j)=><div key={j} style={{textAlign:'center'}}>
              <div style={{fontSize:8,color:'#aaa',marginBottom:2}}>{j+1}</div>
              <Cell v={v} size={24}/>
            </div>)}
          </div>
        </div>
        <button onClick={()=>onLoad(entry)} style={{width:'100%',padding:14,borderRadius:12,border:'none',background:'#534AB7',color:'#fff',fontWeight:500,cursor:'pointer',fontSize:13}}>טען טופס זה מחדש ←</button>
      </>}
    </div>
  </div>;
}

// ── Main App ──────────────────────────────────────────────────
function MainApp({games,preds,dataMode,onNewForm,onHistory}){
  const [tab,setTab]=useState('form');
  const [sel,setSel]=useState(null);
  const [picks,setPicks]=useState({});
  const [autoMode,setAuto]=useState(null);
  const cnt=Object.values(picks).filter(Boolean).length;
  const setPick=(id,v)=>setPicks(p=>({...p,[id]:p[id]===v?null:v}));
  const applyFill=mode=>{
    const row=buildRow(mode,preds,games);
    const np={};games.forEach((g,i)=>{np[g.id]=row[i]});
    setPicks(np);setAuto(mode);setTab('picks');
  };
  const safeRow=buildRow('safe',preds,games);
  const selP=sel?preds[sel.id]:null;

  return <div style={{background:'#f8f8fc',minHeight:'100vh'}}>
    <div style={{background:'#fff',borderBottom:'0.5px solid #e8e8f0',padding:'14px 14px 0',position:'sticky',top:0,zIndex:100}}>
      <div style={{maxWidth:600,margin:'0 auto'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
          <div style={{display:'flex',alignItems:'center',gap:9}}>
            <div style={{width:34,height:34,borderRadius:10,background:'#534AB7',display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,color:'#EEEDFE'}}>⚽</div>
            <div>
              <div style={{fontSize:16,fontWeight:500}}>טוטו אנליזר</div>
              <div style={{fontSize:9,color:'#534AB7',fontWeight:500}}>🤖 one · sofascore · flashscore</div>
            </div>
          </div>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <button onClick={onHistory} style={{background:'#f5f5f5',border:'0.5px solid #e0e0e0',borderRadius:7,padding:'5px 9px',color:'#888',cursor:'pointer',fontSize:11}}>📚</button>
            <button onClick={onNewForm} style={{background:'#EEEDFE',border:'0.5px solid #AFA9EC',borderRadius:7,padding:'5px 9px',color:'#534AB7',cursor:'pointer',fontSize:10,fontWeight:500}}>+ טופס</button>
            <div style={{textAlign:'center'}}>
              <div style={{fontSize:8,color:'#aaa'}}>מילאתי</div>
              <div style={{fontSize:17,fontWeight:500,color:cnt===games.length?'#1D9E75':'#1a1a2e'}}>{cnt}<span style={{fontSize:10,color:'#aaa'}}>/{games.length}</span></div>
            </div>
          </div>
        </div>
        <div style={{display:'flex'}}>
          {[['form','📋 טופס'],['ai','🤖 ניתוח'],['rows','✨ שורות'],['picks','✏️ שלי']].map(([t,lb])=><button key={t} onClick={()=>{setTab(t);setSel(null)}} style={{flex:1,padding:'10px 2px',border:'none',borderBottom:tab===t?'2px solid #534AB7':'2px solid transparent',background:'transparent',color:tab===t?'#534AB7':'#aaa',fontWeight:tab===t?500:400,fontSize:11,cursor:'pointer'}}>{lb}</button>)}
        </div>
      </div>
    </div>

    <div style={{maxWidth:600,margin:'0 auto',padding:'13px 13px 100px'}}>

      {tab==='form'&&<div>
        {sel&&selP?<div>
          <button onClick={()=>setSel(null)} style={{background:'#f5f5f5',border:'0.5px solid #e0e0e0',borderRadius:7,padding:'7px 13px',color:'#888',cursor:'pointer',marginBottom:12,fontSize:12}}>← חזרה</button>
          <div style={{background:'#fff',borderRadius:14,padding:18,marginBottom:10,border:'0.5px solid #e8e8f0'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div style={{flex:1,textAlign:'center'}}>
                <div style={{fontSize:14,fontWeight:500,marginBottom:2}}>{sel.home}</div>
                <div style={{fontSize:9,color:'#aaa',marginBottom:6}}>מקום #{selP.hPos}</div>
                <Dots form={selP.hForm}/>
              </div>
              <div style={{textAlign:'center',padding:'0 10px'}}>
                <div style={{width:46,height:46,borderRadius:13,margin:'0 auto',background:VB(selP.pred),border:`0.5px solid ${VC(selP.pred)}`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:21,fontWeight:500,color:VC(selP.pred)}}>{selP.pred}</div>
                <div style={{fontSize:9,color:selP.confColor,marginTop:4,fontWeight:500}}>ביטחון {selP.conf}</div>
              </div>
              <div style={{flex:1,textAlign:'center'}}>
                <div style={{fontSize:14,fontWeight:500,marginBottom:2}}>{sel.away}</div>
                <div style={{fontSize:9,color:'#aaa',marginBottom:6}}>מקום #{selP.aPos}</div>
                <Dots form={selP.aForm}/>
              </div>
            </div>
            <div style={{display:'flex',gap:12}}>
              {[{l:'ניצחון בית',v:selP.win,c:'#1D9E75'},{l:'תיקו',v:selP.draw,c:'#BA7517'},{l:'ניצחון חוץ',v:selP.loss,c:'#A32D2D'}].map(({l,v,c})=><div key={l} style={{flex:1,textAlign:'center'}}>
                <div style={{fontSize:18,fontWeight:500,color:c}}>{v}%</div>
                <div style={{height:4,borderRadius:2,background:'#e0e0e0',overflow:'hidden',margin:'4px 0'}}><div style={{width:v+'%',height:'100%',background:c}}/></div>
                <div style={{fontSize:10,color:'#888'}}>{l}</div>
              </div>)}
            </div>
          </div>
        </div>:<div>
          <div style={{display:'flex',gap:5,marginBottom:12,overflowX:'auto',paddingBottom:3}}>
            {STRATS.map(s=><button key={s.key} onClick={()=>applyFill(s.key)} style={{flexShrink:0,padding:'7px 12px',border:`0.5px solid ${s.bc}66`,borderRadius:20,background:s.bg,color:s.tc,cursor:'pointer',fontSize:11,fontWeight:500}}>{s.icon} {s.title}</button>)}
          </div>
          {games.map((g,i)=>{const p=preds[g.id],myP=picks[g.id];
            return <div key={g.id} onClick={()=>setSel(g)} style={{background:'#fff',borderRadius:12,padding:'12px 14px',marginBottom:8,border:`0.5px solid ${myP?'#AFA9EC':'#e8e8f0'}`,cursor:'pointer'}}>
              <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
                <span style={{fontSize:9,color:'#aaa'}}>#{i+1}</span>
                <span style={{fontSize:9,color:'#aaa'}}>{g.league}</span>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:12,fontWeight:500,marginBottom:3}}>{g.home}</div>
                  {p&&<Dots form={p.hForm}/>}
                </div>
                {p&&<div style={{display:'flex',gap:8,padding:'0 8px'}}>
                  {[{v:p.win,l:'1'},{v:p.draw,l:'X'},{v:p.loss,l:'2'}].map(({v,l})=><div key={l} style={{textAlign:'center'}}>
                    <div style={{fontSize:11,fontWeight:p.pred===l?500:400,color:VC(l),opacity:p.pred===l?1:0.35}}>{v}%</div>
                    <div style={{fontSize:8,color:'#aaa'}}>{l}</div>
                  </div>)}
                </div>}
                <div style={{flex:1,textAlign:'right'}}>
                  <div style={{fontSize:12,fontWeight:500,marginBottom:3}}>{g.away}</div>
                  {p&&<div style={{display:'flex',justifyContent:'flex-end'}}><Dots form={p.aForm}/></div>}
                </div>
              </div>
              {myP&&<div style={{marginTop:7,textAlign:'center'}}>
                <span style={{fontSize:10,fontWeight:500,padding:'2px 9px',borderRadius:20,background:VB(myP),color:VC(myP),border:`0.5px solid ${VC(myP)}44`}}>{myP} {p?.pred===myP?'✓ תואם AI':'⚡ שונה מ-AI'}</span>
              </div>}
            </div>;})}
        </div>}
      </div>}

      {tab==='ai'&&games.map(g=>{const p=preds[g.id];if(!p)return null;
        return <div key={g.id} onClick={()=>{setSel(g);setTab('form')}} style={{background:'#fff',borderRadius:12,padding:'12px 14px',marginBottom:8,border:'0.5px solid #e8e8f0',cursor:'pointer'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{flex:1}}>
              <div style={{fontSize:11,fontWeight:500,marginBottom:4}}>{g.home} – {g.away}</div>
              <div style={{display:'flex',gap:9}}>
                {[{v:p.win,l:'1'},{v:p.draw,l:'X'},{v:p.loss,l:'2'}].map(({v,l})=><div key={l}>
                  <div style={{height:3,width:38,background:'#f0f0f0',borderRadius:2}}><div style={{width:v+'%',height:'100%',background:VC(l),borderRadius:2}}/></div>
                  <div style={{fontSize:9,color:VC(l),opacity:p.pred===l?1:0.35,marginTop:2}}>{l} {v}%</div>
                </div>)}
              </div>
            </div>
            <div style={{textAlign:'center'}}><Cell v={p.pred} size={34}/><div style={{fontSize:8,color:p.confColor,fontWeight:500,marginTop:3}}>{p.conf}</div></div>
          </div>
        </div>;})}

      {tab==='rows'&&<div>
        {STRATS.map(s=>{
          const row=buildRow(s.key,preds,games);
          const diff=s.key!=='safe'?row.filter((v,i)=>v!==safeRow[i]).length:0;
          return <div key={s.key} style={{background:'#fff',borderRadius:14,padding:16,marginBottom:12,border:`0.5px solid ${s.bc}44`}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
              <div style={{display:'flex',alignItems:'center',gap:9}}>
                <div style={{width:34,height:34,borderRadius:9,background:s.bg,border:`0.5px solid ${s.bc}44`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18}}>{s.icon}</div>
                <div>
                  <div style={{fontSize:13,fontWeight:500}}>{s.title}</div>
                  <span style={{fontSize:9,color:s.tc,background:s.bg,padding:'2px 7px',borderRadius:20,border:`0.5px solid ${s.bc}44`,fontWeight:500}}>{s.badge}</span>
                </div>
              </div>
              <button onClick={()=>applyFill(s.key)} style={{padding:'7px 14px',borderRadius:20,border:'none',cursor:'pointer',background:s.bc,color:'#fff',fontWeight:500,fontSize:11}}>החל ✓</button>
            </div>
            <div style={{background:'#fafafa',borderRadius:9,padding:'9px 11px'}}>
              <div style={{fontSize:9,color:'#aaa',marginBottom:6,fontWeight:500}}>תצוגה מקדימה:</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                {row.map((v,i)=><div key={i} style={{textAlign:'center'}}><div style={{fontSize:7,color:'#ccc',marginBottom:2}}>{i+1}</div><Cell v={v}/></div>)}
              </div>
            </div>
            {s.key!=='safe'&&<div style={{marginTop:7,fontSize:10,color:'#aaa',textAlign:'center'}}>{diff} שינויים מהשורה הבטוחה</div>}
          </div>;})}
      </div>}

      {tab==='picks'&&<div>
        {autoMode&&<div style={{background:STRATS.find(s=>s.key===autoMode)?.bg,borderRadius:10,padding:'9px 14px',marginBottom:12,border:`0.5px solid ${STRATS.find(s=>s.key===autoMode)?.bc}44`,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{fontSize:11,color:STRATS.find(s=>s.key===autoMode)?.tc,fontWeight:500}}>{STRATS.find(s=>s.key===autoMode)?.icon} {STRATS.find(s=>s.key===autoMode)?.title}</div>
          <button onClick={()=>{setPicks({});setAuto(null)}} style={{background:'transparent',border:`0.5px solid ${STRATS.find(s=>s.key===autoMode)?.bc}44`,borderRadius:6,padding:'3px 9px',color:STRATS.find(s=>s.key===autoMode)?.tc,cursor:'pointer',fontSize:10}}>נקה</button>
        </div>}
        {games.map((g,i)=>{const p=preds[g.id],myP=picks[g.id];
          return <div key={g.id} style={{background:'#fff',borderRadius:12,padding:'12px 14px',marginBottom:8,border:`0.5px solid ${myP?'#AFA9EC':'#e8e8f0'}`}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:7}}>
              <span style={{fontSize:9,color:'#aaa'}}>#{i+1} · {g.league}</span>
              {p&&<span style={{fontSize:9,color:p.confColor,fontWeight:500}}>ביטחון {p.conf}</span>}
            </div>
            <div style={{fontSize:12,fontWeight:500,textAlign:'center',marginBottom:9}}>{g.home} — {g.away}</div>
            <div style={{display:'flex',gap:7}}>
              {[['1','בית'],['X','תיקו'],['2','חוץ']].map(([v,lb])=>{const isAI=p?.pred===v,isPicked=myP===v;
                return <button key={v} onClick={()=>setPick(g.id,v)} style={{flex:1,padding:'10px 4px',border:`0.5px solid ${isPicked?VC(v):'#e0e0e0'}`,borderRadius:10,cursor:'pointer',background:isPicked?VB(v):'#fafafa',color:isPicked?VC(v):'#aaa',fontWeight:isPicked?500:400,fontSize:16,position:'relative'}}>
                  {isAI&&<div style={{position:'absolute',top:-7,right:-4,background:'#534AB7',borderRadius:4,padding:'1px 4px',fontSize:7,color:'#EEEDFE',fontWeight:500}}>AI</div>}
                  {v}<div style={{fontSize:8,opacity:0.6,marginTop:2}}>{lb}</div>
                  {p&&<div style={{fontSize:8,opacity:0.5}}>{v==='1'?p.win:v==='X'?p.draw:p.loss}%</div>}
                </button>;})}
            </div>
          </div>;})}
      </div>}

      <AppNestBadge/>
    </div>

    {tab!=='rows'&&<div style={{position:'fixed',bottom:0,left:0,right:0,background:'linear-gradient(0deg,#f8f8fc 55%,transparent)',padding:'12px 13px 18px'}}>
      <div style={{maxWidth:600,margin:'0 auto'}}>
        <div style={{background:'#fff',borderRadius:10,padding:'8px 12px',border:'0.5px solid #e8e8f0',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div style={{fontSize:9,color:'#aaa'}}>🛡️ שורה בטוחה:</div>
          <div style={{display:'flex',gap:2}}>{safeRow.map((v,i)=><Cell key={i} v={v} size={19}/>)}</div>
        </div>
      </div>
    </div>}
  </div>;
}

// ── Root ──────────────────────────────────────────────────────
function App(){
  const [screen,setScreen]=useState('setup');
  const [mode,setMode]=useState('ai');
  const [games,setGames]=useState([]);
  const [preds,setPreds]=useState({});
  const [history,setHistory]=useState([]);
  const [saved,setSaved]=useState(null);

  useEffect(()=>{
    setHistory(loadHistory());
    const m=loadMode();if(m)setSaved(m);
  },[]);

  const handleSetup=m=>{setMode(m);saveMode(m);setScreen('enter');};
  const handleGames=async entered=>{
    setGames(entered);setScreen('loading');
    const np={};
    for(const g of entered){
      try{
        let hs=null,as=null;
        if(mode==='ai')[hs,as]=await Promise.all([fetchStats(g.home,g.league),fetchStats(g.away,g.league)]);
        np[g.id]=predict(hs,as);
      }catch{np[g.id]=predict(null,null);}
    }
    setPreds(np);
    const sr=buildRow('safe',np,entered);
    const entry={date:new Date().toISOString(),games:entered,preds:np,safeRow:sr};
    const updated=[entry,...history].slice(0,20);
    setHistory(updated);saveHistory(updated);
    setScreen('main');
  };

  return <>
    {screen==='setup'&&<Setup saved={saved} onDone={handleSetup}/>}
    {screen==='enter'&&<EnterGames onDone={handleGames} onHistory={()=>setScreen('history')}/>}
    {screen==='loading'&&<Loading games={games}/>}
    {screen==='main'&&<MainApp games={games} preds={preds} dataMode={mode} onNewForm={()=>setScreen('enter')} onHistory={()=>setScreen('history')}/>}
    {screen==='history'&&<History history={history} onBack={()=>setScreen(games.length?'main':'enter')} onLoad={e=>{setGames(e.games);setPreds(e.preds||{});setScreen('main');}}/>}
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
