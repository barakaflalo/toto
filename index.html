<script>

const BSD_TOKEN = '1bb3564fb8f33337674cc7d17082f50e914148cb';
const BSD = 'https://sports.bzzoiro.com/api';

// ── State ─────────────────────────────────────────────────────
let state = {
  screen: 'enter', // enter | main | history

// ── Utils ─────────────────────────────────────────────────────
const VC = v => v==='1'?'#1D9E75':v==='X'?'#BA7517':'#A32D2D';
const VB = v => v==='1'?'#E1F5EE':v==='X'?'#FAEEDA':'#FCEBEB';
const VBC = v => v==='1'?'badge-1':v==='X'?'badge-x':'badge-2';

function badge(v,size=22){
  return `<span class="badge ${VBC(v)}" style="width:${size}px;height:${size}px;">${v}</span>`;
}

function showLoading(title,step){
  document.getElementById('loading').style.display='flex';
  document.getElementById('loading-title').textContent=title||'טוען...';
  document.getElementById('loading-step').textContent=step||'';
}
function hideLoading(){document.getElementById('loading').style.display='none';}

function saveHistory(){localStorage.setItem('w16_history',JSON.stringify(state.history));}

// ── BSD API ───────────────────────────────────────────────────
async function bsdGet(path){
  try{
    const r=await fetch(BSD+path,{headers:{'Authorization':'Token '+BSD_TOKEN}});
    if(!r.ok)return null;
    return await r.json();
  }catch{return null;}
}

const HE_EN={
  "מכבי תל אביב":"Maccabi Tel Aviv","הפועל תל אביב":"Hapoel Tel Aviv",
  "מכבי חיפה":"Maccabi Haifa","הפועל חיפה":"Hapoel Haifa",
  "בני סכנין":"Bnei Sakhnin","מכבי פתח תקווה":"Maccabi Petah Tikva",
  "הפועל באר שבע":"Hapoel Beer Sheva","ביתר ירושלים":"Beitar Jerusalem",
  "מכבי נתניה":"Maccabi Netanya","הפועל ירושלים":"Hapoel Jerusalem",
  "מנצ'סטר סיטי":"Manchester City","מנצ'סטר יונייטד":"Manchester United",
  "ליוורפול":"Liverpool","ארסנל":"Arsenal","טוטנהאם":"Tottenham",
  "צ'לסי":"Chelsea","ביירן מינכן":"Bayern Munich","ברצלונה":"Barcelona",
  "ריאל מדריד":"Real Madrid","אטלטיקו מדריד":"Atletico Madrid",
  "יובנטוס":"Juventus","אינטר מילאן":"Inter Milan","מילאן":"AC Milan",
  "נאפולי":"Napoli","רומא":"AS Roma","לאציו":"Lazio",
  "בורוסיה דורטמונד":"Borussia Dortmund","לייפציג":"RB Leipzig",
  "לאוורקוזן":"Bayer Leverkusen","אייאקס":"Ajax","פורטו":"Porto",
  "בנפיקה":"Benfica","סביליה":"Sevilla","ולנסיה":"Valencia",
  "ניוקאסל":"Newcastle","אסטון וילה":"Aston Villa","ווסטהאם":"West Ham",
  "פריז סן ז'רמן":"Paris Saint-Germain","וייארל":"Villarreal"
};

async function findTeam(name){
  const queries = [name, HE_EN[name]||''];
  // הוסף גם את המילה הראשונה
  const words = (HE_EN[name]||name).split(' ');
  if(words.length>1) queries.push(words[0]);
  for(const q of queries){
    if(!q||q.length<2) continue;
    const d = await bsdGet('/teams/?search='+encodeURIComponent(q)+'&limit=5');
    if(d?.results?.length){
      return d.results.find(t=>
        t.name.toLowerCase().includes(q.toLowerCase().split(' ')[0])
      ) || d.results[0];
    }
  }
  return null;
}

async function fetchTeamStats(name, league){
  try{
    const team = await findTeam(name);
    if(!team) return null;
    const ev = await bsdGet('/events/?team='+team.id+'&status=finished&limit=15&ordering=-event_date');
    if(!ev?.results?.length) return null;
    let wins=0,draws=0,losses=0,gf=0,ga=0;
    const form=[];
    for(const m of ev.results){
      const isHome = String(m.home_team_id)===String(team.id);
      const hs=Number(m.home_score)||0, as=Number(m.away_score)||0;
      const mg=isHome?hs:as, og=isHome?as:hs;
      gf+=mg; ga+=og;
      if(mg>og){wins++;if(form.length<5)form.push(1);}
      else if(mg===og){draws++;if(form.length<5)form.push(2);}
      else{losses++;if(form.length<5)form.push(0);}
    }
    const tot=wins+draws+losses||1;
    let position=10;
    try{
      const st=await bsdGet('/standings/?team='+team.id+'&limit=1&ordering=-season');
      if(st?.results?.[0]?.position) position=st.results[0].position;
    }catch{}
    return{wins,draws,losses,position,
      goalsFor:parseFloat((gf/tot).toFixed(2)),
      goalsAgainst:parseFloat((ga/tot).toFixed(2)),
      form:form.slice(0,5),teamName:team.name};
  }catch(e){return null;}
}

// ── Prediction Engine ─────────────────────────────────────────
function formScore(form){
  if(!form||!form.length) return 0.5;
  const w=[0.35,0.25,0.2,0.12,0.08];
  let s=0;
  form.forEach((r,i)=>{const wt=w[i]||0.05;s+=r===1?wt:r===2?wt*0.4:0;});
  return Math.min(1,s/0.7);
}

function predictMatch(hs,as_){
  const D={wins:40,draws:20,losses:40,form:[0,1,0,1,0],position:8,goalsFor:1.2,goalsAgainst:1.4};
  const h={...D,...(hs||{})}, a={...D,...(as_||{})};
  const ht=h.wins+h.draws+h.losses||1, at=a.wins+a.draws+a.losses||1;
  const elo=1/(1+Math.pow(10,-((16-(h.position||8))*40-(16-(a.position||8))*40)/400));
  const hS=(h.wins/ht)*0.25+formScore(h.form)*0.2+elo*0.25+(h.goalsFor/1.5)*0.1+(1-h.goalsAgainst/2.5)*0.1+0.12;
  const aS=(a.wins/at)*0.25+formScore(a.form)*0.2+(1-elo)*0.25+(a.goalsFor/1.5)*0.1+(1-a.goalsAgainst/2.5)*0.1;
  const dF=((h.draws/ht+a.draws/at)/2)*0.85;
  const tot=hS+aS+dF||1;
  const win=Math.round(hS/tot*100), loss=Math.round(aS/tot*100), draw=100-win-loss;
  const max=Math.max(win,draw,loss);
  const pred=win>=draw&&win>=loss?'1':draw>=win&&draw>=loss?'X':'2';
  const sorted=[{v:win,l:'1'},{v:draw,l:'X'},{v:loss,l:'2'}].sort((a,b)=>b.v-a.v);
  return{win,draw,loss,pred,max,surprise:sorted[1].v>=26?sorted[1].l:sorted[2].l,
    conf:max>55?'גבוהה':max>42?'בינונית':'נמוכה',
    confColor:max>55?'#1D9E75':max>42?'#BA7517':'#A32D2D',
    hData:h, aData:a};
}

function buildRow(mode){
  return state.games.map(g=>{
    const p=state.preds[g.id]; if(!p) return '?';
    if(mode==='safe') return p.pred;
    if(mode==='surprise') return p.surprise;
    // bold
    if(p.max<50){const s=[{v:p.win,l:'1'},{v:p.draw,l:'X'},{v:p.loss,l:'2'}].sort((a,b)=>b.v-a.v);return s[1].l;}
    return p.pred;
  });
}

// ── Render ────────────────────────────────────────────────────
function render(){
  const el=document.getElementById('main-content');
  if(state.screen==='enter'){renderEnter(el);return;}
  if(state.screen==='history'){renderHistory(el);return;}
  renderMain(el);
}

  const topEl=document.querySelector('.tabs');
  topEl.style.display='none';
  el.innerHTML=`
  <div class="card" style="border:1px solid #AFA9EC;margin-bottom:14px;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
      <div style="width:36px;height:36px;border-radius:10px;background:#EEEDFE;display:flex;align-items:center;justify-content:center;font-size:18px;">🤖</div>
      <div><div style="font-size:13px;font-weight:500;">הדבק טקסט מ-winner.co.il</div><div style="font-size:11px;color:#888;">העתק את הטקסט מהדף והדבק כאן</div></div>
    </div>
    <div style="font-size:11px;color:#888;background:#f5f5f5;border-radius:8px;padding:8px 10px;margin-bottom:10px;line-height:1.8;">
      1. כנס ל-<a href="https://www.winner.co.il/משחקים/וינר-16/רגיל" target="_blank" style="color:#534AB7;font-weight:500;">winner.co.il</a><br>
      2. Ctrl+A (בחר הכל) ← Ctrl+C (העתק)<br>
      3. הדבק כאן ולחץ "נתח"
    </div>
    <textarea id="paste-input" placeholder="הדבק כאן את הטקסט מהאתר..." rows="5"
      style="width:100%;padding:10px;border-radius:10px;border:1px solid #AFA9EC;background:#fafafa;font-size:12px;resize:vertical;margin-bottom:10px;"></textarea>
    <button class="btn btn-primary" onclick="parsePasteText()" style="margin-bottom:6px;">🔍 נתח טקסט ← ייבא משחקים</button>
    <div id="paste-msg"></div>
  </div>

  <div style="display:flex;align-items:center;gap:10px;margin:14px 0;">
    <div style="flex:1;height:1px;background:#e0e0e0;"></div>
    <span style="font-size:11px;color:#aaa;">או הכנס ידנית</span>
    <div style="flex:1;height:1px;background:#e0e0e0;"></div>
  </div>

  <div style="background:#EEEDFE;border-radius:10px;padding:10px 14px;margin-bottom:14px;border:1px solid #AFA9EC;font-size:11px;color:#534AB7;line-height:1.8;">
    💡 כנס ל-<strong>winner.co.il</strong> · נתונים מ-<strong>BSD API · sofascore · one.co.il</strong>
  </div>

  <div id="games-list"></div>
  <div id="enter-footer" style="position:fixed;bottom:0;left:0;right:0;background:linear-gradient(0,#f8f8fc 60%,transparent);padding:14px 14px 22px;">
    <div style="max-width:600px;margin:0 auto;">
      <button class="btn btn-primary" id="analyze-btn" onclick="startAnalysis()" style="opacity:0.4;" disabled>
        עוד 16 משחקים... (0/16)
      </button>
    </div>
  </div>`;
  buildGamesList();
}

let gamesData = Array.from({length:16},(_,i)=>({id:i+1,home:'',away:'',league:''}));

function buildGamesList(){
  const LEAGUES=['ליגת העל','פרמייר ליג','לה ליגה','בונדסליגה','סריה א','ליג 1','ארדיביזי','ליגת האלופות','אחר'];
  const el=document.getElementById('games-list');
  if(!el) return;
  el.innerHTML=gamesData.map((g,i)=>`
    <div class="card" style="padding:11px 12px;border:1px solid ${g.home&&g.away?'#AFA9EC':'#e8e8f0'};">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;">
        <span style="font-size:9px;color:#aaa;">משחק #${i+1}</span>
        <select class="select" style="width:auto;padding:3px 6px;font-size:10px;background:#f5f5f5;border:none;"
          onchange="updateGame(${g.id},'league',this.value)">
          <option value="">ליגה...</option>
          ${LEAGUES.map(l=>`<option value="${l}" ${g.league===l?'selected':''}>${l}</option>`).join('')}
        </select>
      </div>
      <div style="display:flex;gap:7px;align-items:center;">
        <input class="inp" placeholder="קבוצת בית" value="${g.home}"
          oninput="updateGame(${g.id},'home',this.value)" style="flex:1;">
        <span style="font-size:10px;color:#ccc;font-weight:500;">VS</span>
        <input class="inp" placeholder="קבוצת חוץ" value="${g.away}"
          oninput="updateGame(${g.id},'away',this.value)" style="flex:1;">
      </div>
    </div>`).join('');
  updateAnalyzeBtn();
}

function updateGame(id,field,val){
  const g=gamesData.find(g=>g.id===id);
  if(g) g[field]=val;
  const card=document.querySelector(`#games-list .card:nth-child(${id})`);
  if(card) card.style.borderColor=gamesData[id-1]?.home&&gamesData[id-1]?.away?'#AFA9EC':'#e8e8f0';
  updateAnalyzeBtn();
}

function updateAnalyzeBtn(){
  const filled=gamesData.filter(g=>g.home.trim()&&g.away.trim()).length;
  const btn=document.getElementById('analyze-btn');
  if(!btn) return;
  if(filled===16){
    btn.textContent='🤖 נתח את הטופס ←';
    btn.style.opacity='1';
    btn.disabled=false;
  } else {
    btn.textContent=`עוד ${16-filled} משחקים... (${filled}/16)`;
    btn.style.opacity='0.4';
    btn.disabled=true;
  }
}

function parsePasteText(){
  const text=document.getElementById('paste-input').value;
  if(!text.trim()){showPasteMsg('הדבק תחילה טקסט','err');return;}
  const found=extractGamesFromText(text);
  if(found.length>=8){
    gamesData=Array.from({length:16},(_,i)=>found[i]||{id:i+1,home:'',away:'',league:''});
    gamesData.forEach((g,i)=>g.id=i+1);
    showPasteMsg(`✓ זוהו ${found.length} משחקים!`,'ok');
    buildGamesList();
  } else {
    showPasteMsg(`זוהו רק ${found.length} משחקים — נסה להעתיק יותר טקסט`,'err');
  }
}

function extractGamesFromText(text){
  const lines=text.split(/[\n\r]+/).map(l=>l.trim()).filter(Boolean);
  const found=[];
  for(const line of lines){
    if(found.length>=16) break;
    // דפוסים: "קבוצה נגד קבוצה" / "קבוצה - קבוצה" / "קבוצה vs קבוצה"
    const m=line.match(/^(.+?)\s+(?:נגד|vs\.?|-|–)\s+(.+?)(?:\s+\d|$)/i);
    if(m){
      const home=m[1].replace(/^\d+[\.)]\s*/,'').trim();
      const away=m[2].trim();
      if(home.length>1&&away.length>1&&!home.match(/^\d+$/)&&!away.match(/^\d+$/)){
        const lc=line.toLowerCase();
        const league=lc.includes('פרמייר')?'פרמייר ליג':
          lc.includes('ספרד')||lc.includes('לה ליגה')?'לה ליגה':
          lc.includes('בונד')?'בונדסליגה':
          lc.includes('סריה')?'סריה א':
          lc.includes('ליג 1')||lc.includes('צרפת')?'ליג 1':
          lc.includes('ליגת העל')||lc.includes('ישראל')?'ליגת העל':'';
        found.push({id:found.length+1,home,away,league});
      }
    }
  }
  return found;
}

function showPasteMsg(txt,type){
  const el=document.getElementById('paste-msg');
  if(!el) return;
  el.innerHTML=`<div style="margin-top:6px;padding:8px 12px;border-radius:8px;font-size:11px;
    background:${type==='ok'?'#E1F5EE':'#FCEBEB'};color:${type==='ok'?'#085041':'#501313'};text-align:center;">${txt}</div>`;
}

async function startAnalysis(){
  const games=gamesData.filter(g=>g.home.trim()&&g.away.trim());
  state.games=games;
  state.preds={};
  state.picks={};
  showLoading('מנתח '+games.length+' משחקים','מחפש נתונים ב-BSD API...');
  document.getElementById('enter-footer').style.display='none';
  const steps=['מחפש נתוני קבוצות...','טוען תוצאות עונה...','מחשב ELO ופורם...','בונה תחזיות...'];
  let si=0;
  const stepInt=setInterval(()=>{
    si=(si+1)%steps.length;
    const el=document.getElementById('loading-step');
    if(el) el.textContent=steps[si];
  },1500);
  for(const g of games){
    const el=document.getElementById('loading-step');
    if(el) el.textContent='מנתח: '+g.home+' vs '+g.away;
    const [hs,as_]=await Promise.all([fetchTeamStats(g.home,g.league),fetchTeamStats(g.away,g.league)]);
    state.preds[g.id]=predictMatch(hs,as_);
  }
  clearInterval(stepInt);
  // שמור היסטוריה
  const safeRow=buildRow('safe');
  const entry={date:new Date().toISOString(),games:[...games],preds:{...state.preds},safeRow};
  state.history=[entry,...state.history].slice(0,20);
  saveHistory();
  hideLoading();
  state.screen='main';
  state.tab='form';
  document.querySelector('.tabs').style.display='flex';
  render();
}

function renderMain(el){
  document.getElementById('bottom-bar').style.display='block';
  updateSafeRowPreview();
  updatePicksCount();
  if(state.tab==='form') renderFormTab(el);
  else if(state.tab==='ai') renderAITab(el);
  else if(state.tab==='rows') renderRowsTab(el);
  else if(state.tab==='picks') renderPicksTab(el);
}

function updateSafeRowPreview(){
  const sr=buildRow('safe');
  document.getElementById('safe-row-preview').innerHTML=sr.map(v=>badge(v,19)).join('');
}

function updatePicksCount(){
  const cnt=Object.values(state.picks).filter(Boolean).length;
  document.getElementById('picks-count').textContent=cnt;
  document.getElementById('picks-total').textContent='/'+state.games.length;
}

function renderFormTab(el){
  const STRATS=[
    {key:'safe',icon:'🛡️',title:'בטוחה',bg:'#E1F5EE',bc:'#1D9E75',tc:'#085041'},
    {key:'surprise',icon:'⚡',title:'הפתעות',bg:'#FAEEDA',bc:'#BA7517',tc:'#633806'},
    {key:'bold',icon:'🔥',title:'אגרסיבי',bg:'#FCEBEB',bc:'#A32D2D',tc:'#501313'},
  ];
  el.innerHTML=`
    <div style="display:flex;gap:5px;margin-bottom:12px;overflow-x:auto;padding-bottom:3px;">
      ${STRATS.map(s=>`<button onclick="applyFill('${s.key}')"
        style="flex-shrink:0;padding:7px 12px;border:1px solid ${s.bc}66;border-radius:20px;background:${s.bg};color:${s.tc};cursor:pointer;font-size:11px;font-weight:500;white-space:nowrap;">
        ${s.icon} ${s.title}</button>`).join('')}
    </div>
    ${state.games.map((g,i)=>{
      const p=state.preds[g.id];
      const myP=state.picks[g.id];
      return `<div class="card" onclick="openGameDetail(${g.id})" style="cursor:pointer;border-color:${myP?'#AFA9EC':'#e8e8f0'};">
        <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
          <span style="font-size:9px;color:#aaa;">#${i+1}</span>
          <span style="font-size:9px;color:#aaa;">${g.league||''}</span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <div style="flex:1;">
            <div style="font-size:12px;font-weight:500;margin-bottom:3px;">${g.home}</div>
            ${p?`<div style="display:flex;gap:3px;">${(p.hData?.form||[]).map(r=>`<div style="width:7px;height:7px;border-radius:50%;background:${r===1?'#1D9E75':r===2?'#BA7517':'#A32D2D'};"></div>`).join('')}</div>`:''}
          </div>
          ${p?`<div style="display:flex;gap:8px;padding:0 8px;">
            ${[{v:p.win,l:'1'},{v:p.draw,l:'X'},{v:p.loss,l:'2'}].map(({v,l})=>`
              <div style="text-align:center;">
                <div style="font-size:11px;font-weight:${p.pred===l?500:400};color:${VC(l)};opacity:${p.pred===l?1:0.35};">${v}%</div>
                <div style="font-size:8px;color:#aaa;">${l}</div>
              </div>`).join('')}
          </div>`:'<div style="font-size:11px;color:#aaa;padding:0 8px;">טוען...</div>'}
          <div style="flex:1;text-align:right;">
            <div style="font-size:12px;font-weight:500;margin-bottom:3px;">${g.away}</div>
            ${p?`<div style="display:flex;justify-content:flex-end;gap:3px;">${(p.aData?.form||[]).map(r=>`<div style="width:7px;height:7px;border-radius:50%;background:${r===1?'#1D9E75':r===2?'#BA7517':'#A32D2D'};"></div>`).join('')}</div>`:''}
          </div>
        </div>
        ${myP?`<div style="margin-top:7px;text-align:center;">
          <span style="font-size:10px;font-weight:500;padding:2px 9px;border-radius:20px;background:${VB(myP)};color:${VC(myP)};border:1px solid ${VC(myP)}44;">
            ${myP} ${p?.pred===myP?'✓ תואם AI':'⚡ שונה מ-AI'}</span></div>`:''}
      </div>`;
    }).join('')}
    ${renderAppNestBadge()}`;
}

function openGameDetail(id){
  const g=state.games.find(g=>g.id===id);
  const p=state.preds[id];
  if(!g||!p) return;
  const el=document.getElementById('main-content');
  el.innerHTML=`
    <button onclick="switchTab('form',null)" style="background:#f5f5f5;border:1px solid #e0e0e0;border-radius:7px;padding:7px 13px;color:#888;cursor:pointer;margin-bottom:12px;font-size:12px;">← חזרה</button>
    <div class="card">
      ${g.league?`<div style="text-align:center;margin-bottom:10px;"><span style="background:#f5f5f5;border-radius:20px;padding:3px 10px;font-size:10px;color:#888;">${g.league}</span></div>`:''}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <div style="flex:1;text-align:center;">
          <div style="font-size:14px;font-weight:500;margin-bottom:2px;">${g.home}</div>
          <div style="font-size:9px;color:#aaa;margin-bottom:6px;">מקום #${p.hData?.position||'?'}</div>
          <div style="display:flex;gap:3px;justify-content:center;">${(p.hData?.form||[]).map(r=>`<div style="width:8px;height:8px;border-radius:50%;background:${r===1?'#1D9E75':r===2?'#BA7517':'#A32D2D'};"></div>`).join('')}</div>
        </div>
        <div style="text-align:center;padding:0 10px;">
          <div style="width:46px;height:46px;border-radius:13px;margin:0 auto;background:${VB(p.pred)};border:1px solid ${VC(p.pred)};display:flex;align-items:center;justify-content:center;font-size:21px;font-weight:500;color:${VC(p.pred)};">${p.pred}</div>
          <div style="font-size:9px;color:${p.confColor};margin-top:4px;font-weight:500;">ביטחון ${p.conf}</div>
        </div>
        <div style="flex:1;text-align:center;">
          <div style="font-size:14px;font-weight:500;margin-bottom:2px;">${g.away}</div>
          <div style="font-size:9px;color:#aaa;margin-bottom:6px;">מקום #${p.aData?.position||'?'}</div>
          <div style="display:flex;gap:3px;justify-content:center;">${(p.aData?.form||[]).map(r=>`<div style="width:8px;height:8px;border-radius:50%;background:${r===1?'#1D9E75':r===2?'#BA7517':'#A32D2D'};"></div>`).join('')}</div>
        </div>
      </div>
      <div style="display:flex;gap:12px;">
        ${[{l:'ניצחון בית',v:p.win,c:'#1D9E75'},{l:'תיקו',v:p.draw,c:'#BA7517'},{l:'ניצחון חוץ',v:p.loss,c:'#A32D2D'}].map(({l,v,c})=>`
          <div style="flex:1;text-align:center;">
            <div style="font-size:20px;font-weight:500;color:${c};margin-bottom:4px;">${v}%</div>
            <div class="pct-bar"><div style="width:${v}%;height:100%;background:${c};border-radius:2px;"></div></div>
            <div style="font-size:10px;color:#888;">${l}</div>
          </div>`).join('')}
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      ${[[`⚽ גולים`,`${(p.hData?.goalsFor||0).toFixed(1)} | ${(p.aData?.goalsFor||0).toFixed(1)}`,'#534AB7'],
        [`📍 טבלה`,`#${p.hData?.position||'?'} | #${p.aData?.position||'?'}`,'#185FA5'],
        [`🏠 יתרון בית`,'+12% ממוצע','#1D9E75'],
        [`🔥 ניצחונות`,`${p.hData?.wins||0}W | ${p.aData?.wins||0}W`,'#BA7517']
      ].map(([t,v,c])=>`<div class="card" style="padding:11px;"><div style="font-size:9px;color:#aaa;margin-bottom:3px;">${t}</div><div style="font-size:14px;font-weight:500;color:${c};">${v}</div></div>`).join('')}
    </div>`;
}

function renderAITab(el){
  el.innerHTML=state.games.map(g=>{
    const p=state.preds[g.id]; if(!p) return '';
    return `<div class="card" onclick="openGameDetail(${g.id})" style="cursor:pointer;">
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="flex:1;">
          <div style="font-size:11px;font-weight:500;margin-bottom:4px;">${g.home} – ${g.away}</div>
          <div style="display:flex;gap:9px;">
            ${[{v:p.win,l:'1'},{v:p.draw,l:'X'},{v:p.loss,l:'2'}].map(({v,l})=>`
              <div>
                <div class="pct-bar" style="width:38px;"><div style="width:${v}%;height:100%;background:${VC(l)};border-radius:2px;"></div></div>
                <div style="font-size:9px;color:${VC(l)};opacity:${p.pred===l?1:0.35};margin-top:2px;">${l} ${v}%</div>
              </div>`).join('')}
          </div>
        </div>
        <div style="text-align:center;">
          ${badge(p.pred,34)}
          <div style="font-size:8px;color:${p.confColor};font-weight:500;margin-top:3px;">${p.conf}</div>
        </div>
      </div>
    </div>`;
  }).join('')+renderAppNestBadge();
}

const STRAT_CONFIG=[
  {key:'safe',icon:'🛡️',title:'שורה בטוחה',badge:'הכי בטוח',bc:'#1D9E75',bg:'#E1F5EE',tc:'#085041',desc:'האחוזים הגבוהים ביותר בכל משחק'},
  {key:'surprise',icon:'⚡',title:'הפתעות סטטיסטיות',badge:'ריסק בינוני',bc:'#BA7517',bg:'#FAEEDA',tc:'#633806',desc:'תוצאות שנראות פחות צפויות אך מגובות בנתונים'},
  {key:'bold',icon:'🔥',title:'שורה אגרסיבית',badge:'ריסק גבוה',bc:'#A32D2D',bg:'#FCEBEB',tc:'#501313',desc:'במשחקים לא-סגורים בוחר אופציה שנייה'},
];

function renderRowsTab(el){
  const safeRow=buildRow('safe');
  el.innerHTML=STRAT_CONFIG.map(s=>{
    const row=buildRow(s.key);
    const diff=s.key!=='safe'?row.filter((v,i)=>v!==safeRow[i]).length:0;
    return `<div class="card" style="border:1px solid ${s.bc}44;margin-bottom:12px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <div style="display:flex;align-items:center;gap:9px;">
          <div style="width:34px;height:34px;border-radius:9px;background:${s.bg};border:1px solid ${s.bc}44;display:flex;align-items:center;justify-content:center;font-size:18px;">${s.icon}</div>
          <div>
            <div style="font-size:13px;font-weight:500;">${s.title}</div>
            <span style="font-size:9px;color:${s.tc};background:${s.bg};padding:2px 7px;border-radius:20px;border:1px solid ${s.bc}44;font-weight:500;">${s.badge}</span>
          </div>
        </div>
        <button onclick="applyFill('${s.key}')" style="padding:7px 14px;border-radius:20px;border:none;cursor:pointer;background:${s.bc};color:#fff;font-weight:500;font-size:11px;">החל ✓</button>
      </div>
      <div style="font-size:11px;color:#888;margin-bottom:10px;line-height:1.6;">${s.desc}</div>
      <div style="background:#fafafa;border-radius:9px;padding:9px 11px;">
        <div style="font-size:9px;color:#aaa;margin-bottom:6px;font-weight:500;">תצוגה מקדימה:</div>
        <div style="display:flex;flex-wrap:wrap;gap:4px;">
          ${row.map((v,i)=>`<div style="text-align:center;"><div style="font-size:7px;color:#ccc;margin-bottom:2px;">${i+1}</div>${badge(v)}</div>`).join('')}
        </div>
      </div>
      ${s.key!=='safe'?`<div style="margin-top:7px;font-size:10px;color:#aaa;text-align:center;">${diff} שינויים מהשורה הבטוחה</div>`:''}
    </div>`;
  }).join('')+renderAppNestBadge();
}

function renderPicksTab(el){
  const autoMode=state.autoMode;
  const sc=autoMode?STRAT_CONFIG.find(s=>s.key===autoMode):null;
  el.innerHTML=(sc?`<div style="background:${sc.bg};border-radius:10px;padding:9px 14px;margin-bottom:12px;border:1px solid ${sc.bc}44;display:flex;justify-content:space-between;align-items:center;">
    <div style="font-size:11px;color:${sc.tc};font-weight:500;">${sc.icon} ${sc.title}</div>
    <button onclick="clearPicks()" style="background:transparent;border:1px solid ${sc.bc}44;border-radius:6px;padding:3px 9px;color:${sc.tc};cursor:pointer;font-size:10px;">נקה</button>
  </div>`:'') +
  state.games.map((g,i)=>{
    const p=state.preds[g.id], myP=state.picks[g.id];
    return `<div class="card" style="border-color:${myP?'#AFA9EC':'#e8e8f0'};">
      <div style="display:flex;justify-content:space-between;margin-bottom:7px;">
        <span style="font-size:9px;color:#aaa;">#${i+1} · ${g.league||''}</span>
        ${p?`<span style="font-size:9px;color:${p.confColor};font-weight:500;">ביטחון ${p.conf}</span>`:''}
      </div>
      <div style="font-size:12px;font-weight:500;text-align:center;margin-bottom:9px;">${g.home} — ${g.away}</div>
      <div style="display:flex;gap:7px;">
        ${[['1','בית'],['X','תיקו'],['2','חוץ']].map(([v,lb])=>{
          const isAI=p?.pred===v, isPicked=myP===v;
          return `<button onclick="togglePick(${g.id},'${v}')"
            style="flex:1;padding:10px 4px;border:1px solid ${isPicked?VC(v):'#e0e0e0'};border-radius:10px;cursor:pointer;
            background:${isPicked?VB(v):'#fafafa'};color:${isPicked?VC(v):'#aaa'};font-weight:${isPicked?500:400};font-size:16px;position:relative;">
            ${isAI?`<div style="position:absolute;top:-7px;right:-4px;background:#534AB7;border-radius:4px;padding:1px 4px;font-size:7px;color:#EEEDFE;font-weight:500;">AI</div>`:''}
            ${v}<div style="font-size:8px;opacity:0.6;margin-top:2px;">${lb}</div>
            ${p?`<div style="font-size:8px;opacity:0.5;">${v==='1'?p.win:v==='X'?p.draw:p.loss}%</div>`:''}
          </button>`;
        }).join('')}
      </div>
    </div>`;
  }).join('')+renderAppNestBadge();
}

function applyFill(mode){
  const row=buildRow(mode);
  state.picks={};
  state.games.forEach((g,i)=>{state.picks[g.id]=row[i];});
  state.autoMode=mode;
  switchTab('picks',null);
}

function togglePick(id,v){
  state.picks[id]=state.picks[id]===v?null:v;
  updatePicksCount();
  renderPicksTab(document.getElementById('main-content'));
}

function clearPicks(){state.picks={};state.autoMode=null;renderPicksTab(document.getElementById('main-content'));}

function renderHistory(el){
  document.getElementById('bottom-bar').style.display='none';
  document.querySelector('.tabs').style.display='none';
  el.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
      <button onclick="backToMain()" style="background:#f5f5f5;border:1px solid #e0e0e0;border-radius:8px;padding:7px 13px;color:#888;cursor:pointer;font-size:12px;">←</button>
      <div style="font-size:15px;font-weight:500;">📚 היסטוריית טפסים</div>
      <div style="font-size:11px;color:#aaa;">${state.history.length} טפסים</div>
    </div>
    ${state.history.length===0?`<div style="text-align:center;padding:60px 20px;color:#aaa;font-size:13px;">אין היסטוריה עדיין.</div>`:''}
    ${state.history.map((h,i)=>{
      const dt=new Date(h.date);
      return `<div class="card" onclick="loadHistoryEntry(${i})" style="cursor:pointer;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <div style="font-size:13px;font-weight:500;">טופס ${dt.getDate()}/${dt.getMonth()+1}/${dt.getFullYear()}</div>
          <div style="font-size:10px;color:#aaa;">${h.games?.length} משחקים</div>
        </div>
        <div style="display:flex;gap:3px;flex-wrap:wrap;">${(h.safeRow||[]).map(v=>badge(v)).join('')}</div>
      </div>`;
    }).join('')}`;
}

function loadHistoryEntry(i){
  const entry=state.history[i];
  state.games=[...entry.games];
  state.preds={...entry.preds};
  state.picks={};
  state.screen='main';
  state.tab='form';
  document.querySelector('.tabs').style.display='flex';
  render();
}

function renderAppNestBadge(){
  return `<div class="appnest-badge" style="margin-top:16px;">
    <a href="https://barakaflalo.github.io/appnest" target="_blank">
      <svg width="28" height="28" viewBox="0 0 58 58"><polygon points="29,2 54,16 54,42 29,56 4,42 4,16" fill="#d4a853"/><polygon points="29,5 51,17.5 51,40.5 29,53 7,40.5 7,17.5" fill="#0a0a0a"/><ellipse cx="29" cy="19" rx="6.5" ry="6.5" fill="#e8e8e0"/><circle cx="31" cy="18" r="2" fill="#d4a853"/><path d="M33 20 L39 22 L33 24 Z" fill="#d4a853"/><path d="M22 26 Q12 20 8 24 Q10 30 18 29Z" fill="#222"/><path d="M36 26 Q46 20 50 24 Q48 30 40 29Z" fill="#222"/></svg>
      <div style="flex:1;"><div style="font-size:13px;font-weight:700;color:#d4a853;">AppNest</div><div style="font-size:11px;color:#888;">עוד אפליקציות חינמיות ›</div></div>
      <span style="color:#d4a853;font-size:16px;">›</span>
    </a>
  </div>`;
}

// ── Navigation ────────────────────────────────────────────────
function switchTab(tab,btnEl){
  state.tab=tab;
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  if(btnEl) btnEl.classList.add('active');
  else {
    const tabs=[...document.querySelectorAll('.tab')];
    const map={form:0,ai:1,rows:2,picks:3};
    if(tabs[map[tab]]) tabs[map[tab]].classList.add('active');
  }
  render();
}

function showHistory(){state.screen='history';render();}
function showEnter(){
  state.screen='enter';
  document.querySelector('.tabs').style.display='none';
  render();
}
function backToMain(){
  if(state.games.length){
    state.screen='main';
    document.querySelector('.tabs').style.display='flex';
    render();
  } else {
    showEnter();
  }
}

// ── Init ──────────────────────────────────────────────────────
document.querySelector('.tabs').style.display='none';
render();
</script>
</body>
</html>
